<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Budget</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #0f0f0f; color: #fff; padding: 1.5rem; }
    .container { max-width: 520px; margin: 0 auto; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .topbar h2 { font-size: 18px; font-weight: 500; color: #fff; }
    .logout { font-size: 13px; color: #555; cursor: pointer; padding: 6px 12px; border: 1px solid #2a2a2a; border-radius: 8px; }
    .logout:hover { color: #fff; border-color: #444; }
    .card { background: #1a1a1a; border-radius: 14px; padding: 1.25rem; margin-bottom: 14px; border: 1px solid #2a2a2a; }
    .card-title { font-size: 13px; color: #666; margin-bottom: 10px; font-weight: 400; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat { background: #141414; border-radius: 12px; padding: 1rem; border: 1px solid #222; }
    .stat-label { font-size: 12px; color: #555; margin-bottom: 4px; }
    .stat-val { font-size: 22px; font-weight: 500; color: #fff; }
    .stat-val.green { color: #5DCAA5; }
    .stat-val.red { color: #f09595; }
    input, select { width: 100%; padding: 10px 14px; background: #111; border: 1px solid #2a2a2a; border-radius: 10px; font-size: 14px; color: #fff; outline: none; margin-bottom: 10px; }
    input:focus, select:focus { border-color: #7F77DD; }
    select option { background: #1a1a1a; }
    .btn { width: 100%; padding: 11px; background: #7F77DD; color: #fff; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; font-weight: 500; margin-bottom: 10px; }
    .btn:hover { background: #534AB7; }
    .btn-outline { background: transparent; border: 1px solid #2a2a2a; color: #aaa; }
    .btn-outline:hover { border-color: #555; color: #fff; background: transparent; }
    .cat-row { margin-bottom: 14px; }
    .cat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .cat-name { font-size: 14px; color: #ddd; display: flex; align-items: center; gap: 8px; }
    .cat-dot { width: 8px; height: 8px; border-radius: 50%; }
    .cat-right { font-size: 13px; color: #666; }
    .cat-right span { color: #aaa; }
    .bar { height: 5px; background: #222; border-radius: 99px; overflow: hidden; }
    .fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; margin-left: 6px; }
    .ok { background: #0a2a1a; color: #5DCAA5; }
    .mid { background: #2a1f0a; color: #EF9F27; }
    .over { background: #2a0f0f; color: #f09595; }
    .alert { padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 12px; display: none; border: 1px solid; }
    .alert-err { background: #2a0f0f; color: #f09595; border-color: #3a1515; }
    .alert-warn { background: #2a1f0a; color: #EF9F27; border-color: #3a2a0a; }
    .txn { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1f1f1f; }
    .txn:last-child { border-bottom: none; }
    .txn-left { display: flex; align-items: center; gap: 10px; }
    .txn-icon { width: 34px; height: 34px; border-radius: 10px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 15px; }
    .txn-name { font-size: 14px; color: #ddd; }
    .txn-cat { font-size: 12px; color: #555; margin-top: 1px; }
    .txn-amt { font-size: 14px; font-weight: 500; color: #f09595; }
    .empty { color: #444; font-size: 13px; text-align: center; padding: 1rem 0; }
    .divider { height: 1px; background: #1f1f1f; margin: 4px 0 14px; }
  </style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <h2 id="greeting">Hi!</h2>
    <span class="logout" onclick="logout()">Logout</span>
  </div>

  <div class="stat-grid">
    <div class="stat"><div class="stat-label">Monthly budget</div><div class="stat-val" id="statBudget">Rs.0</div></div>
    <div class="stat"><div class="stat-label">Remaining</div><div class="stat-val green" id="statRemaining">Rs.0</div></div>
  </div>

  <div class="card">
    <div class="card-title">Set monthly budget</div>
    <input type="number" id="totalBudget" value="5000" placeholder="Total budget (Rs.)" />
    <button class="btn" onclick="saveBudgets()">Save budget split</button>
  </div>

  <div id="alert" class="alert"></div>

  <div class="card" id="catCard" style="display:none;">
    <div class="card-title">Spending by category</div>
    <div id="categories"></div>
  </div>

  <div class="card">
    <div class="card-title">Add expense</div>
    <select id="expCat">
      <option>Food</option>
      <option>Transport</option>
      <option>Study</option>
      <option>Entertainment</option>
      <option>Other</option>
    </select>
    <input type="number" id="expAmt" placeholder="Amount (Rs.)" />
    <input type="text" id="expNote" placeholder="Note (optional)" />
    <button class="btn" onclick="addExpense()">Add expense</button>
  </div>

  <div class="card">
    <div class="card-title">Recent transactions</div>
    <div id="history"><div class="empty">No expenses yet</div></div>
  </div>
</div>

<script>
var BASE = 'http://localhost/expense_manager/api';
var uid   = localStorage.getItem('user_id');
var uname = localStorage.getItem('user_name');
if (!uid) { window.location.href = 'http://localhost/expense_manager/index.html'; }
document.getElementById('greeting').textContent = 'Hi, ' + uname + '!';
var now = new Date(), month = now.getMonth() + 1, year = now.getFullYear();

var CATS = [
  { name:'Food', pct:50, icon:'🍛', color:'#D85A30' },
  { name:'Transport', pct:20, icon:'🚌', color:'#378ADD' },
  { name:'Study', pct:15, icon:'📚', color:'#1D9E75' },
  { name:'Entertainment', pct:10, icon:'🎬', color:'#BA7517' },
  { name:'Other', pct:5, icon:'💼', color:'#7F77DD' }
];

function showAlert(msg, type) {
  var el = document.getElementById('alert');
  el.className = 'alert ' + type; el.textContent = msg; el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 5000);
}

function saveBudgets() {
  var total = parseFloat(document.getElementById('totalBudget').value);
  var done = 0;
  CATS.forEach(function(cat) {
    fetch(BASE + '/set_budget.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: uid, category: cat.name, percentage: cat.pct, monthly_limit: (cat.pct/100)*total, month: month, year: year })
    }).then(function() {
      done++;
      if (done === CATS.length) { showAlert('Budget saved successfully!', 'alert-warn'); loadDashboard(); }
    });
  });
}

function loadDashboard() {
  fetch(BASE + '/get_budget.php?user_id=' + uid + '&month=' + month + '&year=' + year)
  .then(function(r) { return r.json(); })
  .then(function(bres) {
    var bdata = bres.data || [];
    fetch(BASE + '/get_expenses.php?user_id=' + uid + '&month=' + month + '&year=' + year)
    .then(function(r) { return r.json(); })
    .then(function(eres) {
      var expenses = eres.data || [];
      var totalBudget = 0, totalSpent = 0;
      bdata.forEach(function(b) { totalBudget += parseFloat(b.monthly_limit); });
      expenses.forEach(function(e) { totalSpent += parseFloat(e.amount); });
      document.getElementById('statBudget').textContent = 'Rs.' + Math.round(totalBudget);
      document.getElementById('statRemaining').textContent = 'Rs.' + Math.round(Math.max(totalBudget - totalSpent, 0));

      if (bdata.length > 0) {
        document.getElementById('catCard').style.display = 'block';
        var html = '';
        bdata.forEach(function(b) {
          var catInfo = CATS.find(function(c) { return c.name === b.category; }) || { icon:'•', color:'#555' };
          var spent = 0;
          expenses.forEach(function(e) { if (e.category === b.category) spent += parseFloat(e.amount); });
          var pct = Math.min((spent / b.monthly_limit) * 100, 100);
          var barColor = '#1D9E75', badgeClass = 'ok', badgeText = 'On track';
          if (pct >= 100) { barColor = '#E24B4A'; badgeClass = 'over'; badgeText = 'Limit reached'; }
          else if (pct >= 75) { barColor = '#EF9F27'; badgeClass = 'mid'; badgeText = 'Almost full'; }
          html += '<div class="cat-row"><div class="cat-top"><div class="cat-name"><div class="cat-dot" style="background:' + catInfo.color + ';"></div>' + b.category + '<span class="badge ' + badgeClass + '">' + badgeText + '</span></div><div class="cat-right"><span>Rs.' + Math.round(spent) + '</span> / Rs.' + Math.round(b.monthly_limit) + '</div></div><div class="bar"><div class="fill" style="width:' + pct.toFixed(1) + '%; background:' + barColor + ';"></div></div></div>';
        });
        document.getElementById('categories').innerHTML = html;
      }

      var recent = expenses.slice(0, 8);
      if (recent.length > 0) {
        var txnHtml = '';
        recent.forEach(function(e) {
          var catInfo = CATS.find(function(c) { return c.name === e.category; }) || { icon:'•', color:'#555' };
          txnHtml += '<div class="txn"><div class="txn-left"><div class="txn-icon">' + catInfo.icon + '</div><div><div class="txn-name">' + (e.note || e.category) + '</div><div class="txn-cat">' + e.category + '</div></div></div><div class="txn-amt">-Rs.' + parseFloat(e.amount).toFixed(0) + '</div></div>';
        });
        document.getElementById('history').innerHTML = txnHtml;
      } else {
        document.getElementById('history').innerHTML = '<div class="empty">No expenses yet</div>';
      }
    });
  });
}

function addExpense() {
  var cat    = document.getElementById('expCat').value;
  var amount = parseFloat(document.getElementById('expAmt').value);
  var note   = document.getElementById('expNote').value;
  if (!amount || amount <= 0) { showAlert('Please enter a valid amount', 'alert-err'); return; }
  fetch(BASE + '/add_expense.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: uid, category: cat, amount: amount, note: note })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.status === 'error') {
      showAlert(data.message, 'alert-err');
    } else {
      document.getElementById('expAmt').value = '';
      document.getElementById('expNote').value = '';
      if (data.warning) showAlert(data.warning, 'alert-warn');
      loadDashboard();
    }
  });
}

function logout() { localStorage.clear(); window.location.href = 'http://localhost/expense_manager/index.html'; }
loadDashboard();
</script>
</body>
</html>
