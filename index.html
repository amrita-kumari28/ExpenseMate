<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Budget</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #0f0f0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #1a1a1a; border-radius: 16px; padding: 2rem; width: 360px; border: 1px solid #2a2a2a; }
    .logo { font-size: 22px; font-weight: 500; color: #fff; margin-bottom: 6px; }
    .sub { font-size: 13px; color: #666; margin-bottom: 2rem; }
    label { font-size: 12px; color: #888; display: block; margin-bottom: 6px; margin-top: 14px; }
    input { width: 100%; padding: 11px 14px; background: #111; border: 1px solid #2a2a2a; border-radius: 10px; font-size: 14px; color: #fff; outline: none; }
    input:focus { border-color: #7F77DD; }
    button { width: 100%; padding: 12px; background: #7F77DD; color: #fff; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; margin-top: 1.5rem; font-weight: 500; }
    button:hover { background: #534AB7; }
    .toggle { text-align: center; margin-top: 16px; font-size: 13px; color: #666; cursor: pointer; }
    .toggle span { color: #7F77DD; }
    .msg { font-size: 13px; margin-top: 12px; text-align: center; padding: 8px; border-radius: 8px; display: none; }
    .err { background: #2a1a1a; color: #f09595; display: block; }
    .ok { background: #0f2a1a; color: #5DCAA5; display: block; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Student Budget</div>
  <div class="sub">Track your monthly spending</div>
  <div id="nameWrap" style="display:none;">
    <label>Full name</label>
    <input type="text" id="name" placeholder="Your Name" />
  </div>
  <label>Email</label>
  <input type="email" id="email" placeholder="you@email.com" />
  <label>Password</label>
  <input type="password" id="password" placeholder="••••••••" />
  <button onclick="submit()">Continue</button>
  <div class="msg" id="msg"></div>
  <div class="toggle" onclick="toggle()">No account? <span>Register here</span></div>
</div>
<script>
  var isLogin = true;
  function toggle() {
    isLogin = !isLogin;
    document.getElementById('nameWrap').style.display = isLogin ? 'none' : 'block';
    document.querySelector('.toggle').innerHTML = isLogin ? 'No account? <span>Register here</span>' : 'Have an account? <span>Login</span>';
  }
  async function submit() {
    var email = document.getElementById('email').value;
    var password = document.getElementById('password').value;
    var url = isLogin ? 'http://localhost/expense_manager/api/login.php' : 'http://localhost/expense_manager/api/register.php';
    var body = isLogin ? { email, password } : { name: document.getElementById('name').value, email, password };
    var res = await fetch(url, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    var data = await res.json();
    var msg = document.getElementById('msg');
    if (data.status === 'success') {
      if (isLogin) {
        localStorage.setItem('user_id', data.user_id);
        localStorage.setItem('user_name', data.name);
        window.location.href = 'http://localhost/expense_manager/dashboard.html';
      } else {
        msg.className = 'msg ok'; msg.textContent = 'Registered! Please login.'; toggle();
      }
    } else {
      msg.className = 'msg err'; msg.textContent = data.message;
    }
  }
</script>
</body>
</html>
